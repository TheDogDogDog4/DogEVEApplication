spring:
  # postgreSQL
  datasource:
    url: jdbc:postgresql://postgres:5432/dog
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  # Redis 配置
  data:
    redis:
      host: redis
      port: 6379
      password: 123456
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 1
          max-wait: -1ms