server:
  port: 8080

spring:
  application:
    name: gatewaySystem

    # Nacos
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848

    # 网关核心配置
    gateway:

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # 路由规则
      routes:
        # 用户微服务
        - id: user-system
          uri: http://user-system:8080   # lb = 负载均衡
          predicates:
            - Path=/auth/**

          # eve 微服务
        - id: eve-system
          uri: http://eve-system:8080
          predicates:
            - Path=/eve/**

      # 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

  # Redis 配置
  data:
    redis:
      host: redis
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# RocketMQ 配置
rocketmq:
  name-server: rocketmq-namesrv:9876

token-bucket:
  enable: true
  rate: 10
  capacity: 20
  expire: 60