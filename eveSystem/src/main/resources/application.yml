spring:
  application:
    name: eve-system

# Nacos
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
      config:
        server-addr: nacos:8848
        file-extension: yaml
        import-check:
          enabled: false

# Redis 配置
  data:
    redis:
      host: redis
      port: 6379
      password: 123456
      jedis:
        pool:
          max-active: 8
          max-idle: 8

# postgreSQL
  datasource:
    url: jdbc:postgresql://postgres:5432/dog
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

